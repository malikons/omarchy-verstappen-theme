<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <pattern id="checkers" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="50" height="50" fill="#1a1a1a"/>
      <rect x="50" y="0" width="50" height="50" fill="#0a0e1a"/>
      <rect x="0" y="50" width="50" height="50" fill="#0a0e1a"/>
      <rect x="50" y="50" width="50" height="50" fill="#1a1a1a"/>
    </pattern>
    <linearGradient id="overlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0a0e1a;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  
  <!-- Checkered background -->
  <rect width="1920" height="1080" fill="url(#checkers)"/>
  
  <!-- Gradient overlay -->
  <rect width="1920" height="1080" fill="url(#overlay)"/>
  
  <!-- Racing stripes -->
  <g opacity="0.3">
    <rect x="200" y="0" width="100" height="1080" fill="#e8002d"/>
    <rect x="320" y="0" width="40" height="1080" fill="#ffffff"/>
    <rect x="380" y="0" width="100" height="1080" fill="#21468B"/>
  </g>
  
  <!-- Center design -->
  <circle cx="960" cy="540" r="300" fill="none" stroke="#e8002d" stroke-width="4" opacity="0.3"/>
  <circle cx="960" cy="540" r="250" fill="none" stroke="#ff6600" stroke-width="3" opacity="0.2"/>
  <circle cx="960" cy="540" r="200" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.4"/>
  
  <!-- Text -->
  <text x="960" y="560" font-family="Arial Black, sans-serif" font-weight="900"
        font-size="120" text-anchor="middle" fill="#e8eaf0" opacity="0.15">MAX</text>
</svg>