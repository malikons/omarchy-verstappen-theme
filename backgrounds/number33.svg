<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1629"/>
      <stop offset="100%" style="stop-color:#0a0e1a"/>
    </linearGradient>
    <linearGradient id="speedGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#e8002d;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0a0e1a;stop-opacity:0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>
  
  <!-- Speed lines -->
  <g opacity="0.4">
    <rect x="0" y="200" width="1920" height="2" fill="#e8002d"/>
    <rect x="0" y="400" width="1920" height="3" fill="#ff6600"/>
    <rect x="0" y="600" width="1920" height="2" fill="#ffd700"/>
    <rect x="0" y="800" width="1920" height="2" fill="#e8002d"/>
  </g>
  
  <!-- Large 33 -->
  <text x="960" y="650" font-family="Arial Black, sans-serif" font-weight="900"
        font-size="500" text-anchor="middle" fill="#e8002d" opacity="0.15">33</text>
  
  <!-- Verstappen name -->
  <text x="960" y="750" font-family="Arial, sans-serif" font-weight="bold"
        font-size="80" text-anchor="middle" fill="#e8eaf0" opacity="0.1"
        letter-spacing="20">VERSTAPPEN</text>
  
  <!-- Dutch flag colors strip at bottom -->
  <rect x="0" y="1020" width="640" height="60" fill="#e8002d" opacity="0.6"/>
  <rect x="640" y="1020" width="640" height="60" fill="#ffffff" opacity="0.4"/>
  <rect x="1280" y="1020" width="640" height="60" fill="#21468B" opacity="0.6"/>
</svg>