<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2880 1920" width="2880" height="1920">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="60%" style="stop-color:#0f1629"/>
      <stop offset="100%" style="stop-color:#162040"/>
    </linearGradient>
    <linearGradient id="streak1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8002d;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#e8002d;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#e8002d;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="streak2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6600;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#ff6600;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#ff6600;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="streak3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:0"/>
      <stop offset="60%" style="stop-color:#ffd700;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow-red">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-gold">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="flash" cx="90%" cy="50%" r="30%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:0.12"/>
      <stop offset="40%" style="stop-color:#e8002d;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#0a0e1a;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="2880" height="1920" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#4499ee" stroke-width="1">
    <line x1="0" y1="240" x2="2880" y2="240"/>
    <line x1="0" y1="480" x2="2880" y2="480"/>
    <line x1="0" y1="720" x2="2880" y2="720"/>
    <line x1="0" y1="960" x2="2880" y2="960"/>
    <line x1="0" y1="1200" x2="2880" y2="1200"/>
    <line x1="0" y1="1440" x2="2880" y2="1440"/>
    <line x1="0" y1="1680" x2="2880" y2="1680"/>
    <line x1="360" y1="0" x2="360" y2="1920"/>
    <line x1="720" y1="0" x2="720" y2="1920"/>
    <line x1="1080" y1="0" x2="1080" y2="1920"/>
    <line x1="1440" y1="0" x2="1440" y2="1920"/>
    <line x1="1800" y1="0" x2="1800" y2="1920"/>
    <line x1="2160" y1="0" x2="2160" y2="1920"/>
    <line x1="2520" y1="0" x2="2520" y2="1920"/>
  </g>

  <!-- Speed streaks converging toward vanishing point right of center -->
  <g filter="url(#glow-red)">
    <polygon points="0,800 2880,890 2880,900 0,810"   fill="url(#streak1)" opacity="0.8"/>
    <polygon points="0,855 2880,925 2880,935 0,865"   fill="url(#streak1)" opacity="0.6"/>
    <polygon points="0,910 2880,960 2880,966 0,916"   fill="url(#streak1)" opacity="0.5"/>
    <polygon points="0,1015 2880,1015 2880,1018 0,1018" fill="url(#streak1)" opacity="0.4"/>
    <polygon points="0,745 2880,855 2880,858 0,748"   fill="url(#streak1)" opacity="0.3"/>
    <polygon points="0,690 2880,820 2880,822 0,692"   fill="url(#streak1)" opacity="0.2"/>
  </g>

  <g filter="url(#glow-red)">
    <polygon points="0,827 2880,907 2880,911 0,831"   fill="url(#streak2)" opacity="0.7"/>
    <polygon points="0,882 2880,943 2880,946 0,885"   fill="url(#streak2)" opacity="0.5"/>
    <polygon points="0,963 2880,990 2880,992 0,965"   fill="url(#streak2)" opacity="0.4"/>
  </g>

  <g filter="url(#glow-gold)">
    <polygon points="0,836 2880,916 2880,917 0,837"   fill="url(#streak3)" opacity="0.5"/>
    <polygon points="0,891 2880,951 2880,952 0,892"   fill="url(#streak3)" opacity="0.35"/>
  </g>

  <!-- RB livery diagonal stripe top-right -->
  <polygon points="2100,0 2880,0 2880,540 2400,0" fill="#e8002d" opacity="0.07"/>
  <polygon points="2250,0 2880,0 2880,270 2330,0" fill="#ffd700" opacity="0.05"/>

  <!-- #1 — large, centered, subtle -->
  <text x="1440" y="1160" font-family="'Arial Black', Arial, sans-serif" font-weight="900"
        font-size="800" text-anchor="middle" fill="#e8002d" opacity="0.04"
        letter-spacing="-20">1</text>

  <!-- MAX VERSTAPPEN — bottom right, subtle -->
  <text x="2700" y="1840" font-family="'Arial Black', Arial, sans-serif" font-weight="900"
        font-size="100" text-anchor="end" fill="#e8eaf0" opacity="0.06"
        letter-spacing="8">MAX VERSTAPPEN</text>

  <!-- Bright core flash at vanishing point -->
  <rect width="2880" height="1920" fill="url(#flash)"/>
</svg>
