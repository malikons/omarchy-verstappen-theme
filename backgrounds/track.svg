<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="track" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="50%" style="stop-color:#1a2d50"/>
      <stop offset="100%" style="stop-color:#0a0e1a"/>
    </linearGradient>
  </defs>
  
  <!-- Base -->
  <rect width="1920" height="1080" fill="#0a0e1a"/>
  
  <!-- Racing track curves -->
  <path d="M 0 800 Q 480 700 960 750 T 1920 700" 
        fill="none" stroke="#21468B" stroke-width="100" opacity="0.3"/>
  <path d="M 0 850 Q 480 750 960 800 T 1920 750" 
        fill="none" stroke="#e8002d" stroke-width="60" opacity="0.2"/>
  <path d="M 0 900 Q 480 800 960 850 T 1920 800" 
        fill="none" stroke="#ff6600" stroke-width="30" opacity="0.15"/>
  
  <!-- Pit lane markers -->
  <g opacity="0.4">
    <rect x="100" y="300" width="80" height="20" fill="#e8002d"/>
    <rect x="300" y="300" width="80" height="20" fill="#e8002d"/>
    <rect x="500" y="300" width="80" height="20" fill="#e8002d"/>
    <rect x="700" y="300" width="80" height="20" fill="#e8002d"/>
    <rect x="900" y="300" width="80" height="20" fill="#e8002d"/>
    <rect x="1100" y="300" width="80" height="20" fill="#e8002d"/>
    <rect x="1300" y="300" width="80" height="20" fill="#e8002d"/>
    <rect x="1500" y="300" width="80" height="20" fill="#e8002d"/>
    <rect x="1700" y="300" width="80" height="20" fill="#e8002d"/>
  </g>
  
  <!-- Speedometer effect -->
  <g opacity="0.1">
    <rect x="860" y="200" width="4" height="150" fill="#e8eaf0"/>
    <rect x="920" y="180" width="4" height="170" fill="#e8eaf0"/>
    <rect x="980" y="180" width="4" height="170" fill="#e8eaf0"/>
    <rect x="1040" y="200" width="4" height="150" fill="#e8eaf0"/>
  </g>
  
  <!-- Oranje fan section -->
  <text x="960" y="150" font-family="Arial Black, sans-serif" font-weight="900"
        font-size="100" text-anchor="middle" fill="#ff6600" opacity="0.2">ORANJE</text>
  
  <!-- Racing line -->
  <path d="M 0 950 Q 960 850 1920 950" 
        fill="none" stroke="#ffd700" stroke-width="3" stroke-dasharray="20,20" opacity="0.3"/>
</svg>