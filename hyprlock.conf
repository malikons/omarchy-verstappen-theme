# Verstappen Theme — Hyprlock
# Dutch flag colors: Red border | Dark inner | Gold accents

# Define variables for main hyprlock.conf
$color = rgb(0a0e1a)
$inner_color = rgb(0f1629)
$outer_color = rgb(e8002d)
$font_color = rgb(e8eaf0)
$check_color = rgb(00c853)

background {
    color = $color
}

label {
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(e8eaf0ff)
    font_size = 96
    font_family = Geist Mono Bold
    position = 0, 40
    halign = center
    valign = center
}

label {
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgba(ffd700cc)
    font_size = 22
    font_family = Geist Mono
    position = 0, -60
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 650, 100
    position = 0, -160
    halign = center
    valign = center
    
    outline_thickness = 4
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    
    inner_color = $inner_color
    outer_color = $outer_color
    font_color = $font_color
    check_color = $check_color
    
    placeholder_text = Enter Password
    fade_on_empty = false
    hide_input = false
    rounding = 6
}

shape {
    size = 160, 160
    position = 0, -400
    halign = center
    valign = center
    color = rgb(0f1629)
    border_color = rgb(e8002d)
    border_size = 4
    rounding = -1
}

label {
    text = 󰈷
    color = rgb(ffd700)
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    position = 0, -400
    halign = center
    valign = center
}
