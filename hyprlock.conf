# Verstappen Theme — Hyprlock

background {
    color = rgb(0a0e1a)
}

label {
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(e8eaf0ff)
    font_size = 96
    font_family = Geist Mono Bold
    position = 0, 80
    halign = center
    valign = center
}

label {
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgba(ffd700cc)
    font_size = 22
    font_family = Geist Mono
    position = 0, -20
    halign = center
    valign = center
}

input-field {
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(e8002d)
    inner_color = rgb(0f1629)
    font_color = rgb(e8eaf0)
    fade_on_empty = true
    placeholder_text = <span foreground="##b0b8d0">password</span>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}
